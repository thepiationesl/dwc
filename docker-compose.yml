# DWC Docker Compose - Local Testing
# Usage: docker-compose up -d <service-name>

version: "3.8"

services:
  # Alpine Dev - Full Development Environment
  alpine-dev:
    build:
      context: .
      dockerfile: dev/alpine/Dockerfile
    image: dwc/alpine-dev:latest
    container_name: dwc-alpine-dev
    volumes:
      - ./data/alpine-dev:/config
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # Windows VM - dockur/windows compatible (Manual Mode)
  # Usage:
  #   docker exec -it dwc-vm vm-setup   # Download ISO, drivers, create disk
  #   docker exec -it dwc-vm vm-start   # Start QEMU
  #   docker exec -it dwc-vm vm-stop    # Stop VM gracefully
  #   docker exec -it dwc-vm vm-status  # Check status
  windows:
    build:
      context: .
      dockerfile: dev/vm/Dockerfile
    image: dwc/windows:latest
    container_name: dwc-vm
    environment:
      - VERSION=10
      - LANGUAGE=Chinese
      - VMX=Y
      - HV=N
      - DISK_SIZE=45G
      - CPU_CORES=6
      - RAM_SIZE=16G
      - MANUAL=Y
      - ARGUMENTS=-cpu host,-hypervisor,+vmx
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data/win:/storage
      - ./data/smb:/shared
    ports:
      - "5900:5900"   # VNC
      - "5700:5700"   # VNC WebSocket
      - "7100:7100"   # QEMU Monitor
      - "3389:3389"   # RDP
      - "3389:3389/udp"
      - "445:445"     # Samba
    stop_grace_period: 60s
    restart: unless-stopped

  # Debian Desktop - XFCE + VNC
  debian-desktop:
    build:
      context: .
      dockerfile: desktop/debian/Dockerfile
    image: dwc/debian-desktop:latest
    container_name: dwc-debian-desktop
    volumes:
      - ./data/debian-desktop:/config
    ports:
      - "6080:6080"   # noVNC
      - "5901:5901"   # VNC
    restart: unless-stopped

  # Debian Desktop Audio - with audio and remote desktop
  debian-audio:
    build:
      context: .
      dockerfile: desktop/debian/Dockerfile.audio
    image: dwc/debian-audio:latest
    container_name: dwc-debian-audio
    volumes:
      - ./data/debian-audio:/config
    ports:
      - "6180:6080"   # noVNC
      - "6181:6081"   # Audio WebSocket
      - "6001:5901"   # VNC
      - "3390:3389"   # xrdp
      - "4001:4000"   # NoMachine
    restart: unless-stopped

  # Debian Asbru - asbru-cm connection manager
  debian-asbru:
    build:
      context: .
      dockerfile: desktop/debian/Dockerfile.asbru
    image: dwc/debian-asbru:latest
    container_name: dwc-debian-asbru
    volumes:
      - ./data/debian-asbru:/config
    ports:
      - "6280:6080"   # noVNC
      - "6002:5901"   # VNC
    restart: unless-stopped

  # Kali Desktop - Full desktop with audio
  kali-desktop:
    build:
      context: .
      dockerfile: desktop/kali/Dockerfile
    image: dwc/kali-desktop:latest
    container_name: dwc-kali-desktop
    volumes:
      - ./data/kali-desktop:/config
    ports:
      - "6380:6080"   # noVNC
      - "6381:6081"   # Audio WebSocket
      - "6003:5901"   # VNC
      - "3391:3389"   # xrdp
      - "4002:4000"   # NoMachine
    restart: unless-stopped

  # Privacy - Tor Browser + Pidgin
  privacy:
    build:
      context: .
      dockerfile: privacy/alpine/Dockerfile
    image: dwc/privacy:latest
    container_name: dwc-privacy
    volumes:
      - ./data/privacy:/config
    ports:
      - "6480:6080"   # noVNC
      - "6004:5901"   # VNC
    restart: unless-stopped

volumes:
  alpine-dev-data:
  storage-data:
  debian-desktop-data:
  debian-audio-data:
  debian-asbru-data:
  kali-desktop-data:
  privacy-data:
