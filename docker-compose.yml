# DWC Docker Compose
# Usage: docker-compose up -d <service-name>

version: "3.8"

services:
  # ============================================================================
  # CS50 WINDOWS VM (精简版)
  # ============================================================================
  cs50-vm:
    build:
      context: .
      dockerfile: containers/cs50-vm/Dockerfile
    image: dwc/cs50-vm
    container_name: cs50-vm
    environment:
      - VERSION=10
      - LANGUAGE=Chinese
      - CPU_CORES=4
      - RAM_SIZE=8G
      - DISK_SIZE=64G
      - MANUAL=Y
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - ./data/cs50-storage:/storage
      - ./data/cs50-shared:/shared
    ports:
      - "5900:5900"              # VNC
      - "5700:5700"              # VNC WebSocket
      - "3389:3389"              # RDP
      - "445:445"                # Samba
    stop_grace_period: 60s
    restart: unless-stopped

  # ============================================================================
  # 开发容器
  # ============================================================================
  dev:
    build:
      context: .
      dockerfile: containers/dev/Dockerfile
    image: dwc/dev
    container_name: dwc-dev
    volumes:
      - ./data/dev:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  # ============================================================================
  # 远程桌面
  # ============================================================================
  desktop:
    build:
      context: .
      dockerfile: containers/desktop/debian/Dockerfile
    image: dwc/desktop
    container_name: dwc-desktop
    volumes:
      - ./data/desktop:/config
    ports:
      - "6080:6080"              # noVNC
      - "5901:5901"              # VNC
    restart: unless-stopped

  desktop-audio:
    build:
      context: .
      dockerfile: containers/desktop/debian/Dockerfile.desktop-audio
    image: dwc/desktop-audio
    container_name: dwc-desktop-audio
    volumes:
      - ./data/desktop-audio:/config
    ports:
      - "6180:6080"              # noVNC
      - "6181:6081"              # Audio WebSocket
      - "6001:5901"              # VNC
    restart: unless-stopped

  kali:
    build:
      context: .
      dockerfile: containers/desktop/kali/Dockerfile
    image: dwc/kali
    container_name: dwc-kali
    volumes:
      - ./data/kali:/config
    ports:
      - "6280:6080"              # noVNC
      - "6002:5901"              # VNC
    restart: unless-stopped

  # ============================================================================
  # IMG MERGE SERVICE - 磁盘镜像合并服务
  # ============================================================================
  img-merge-service:
    build:
      context: .
      dockerfile: containers/img-merge-service/Dockerfile
    image: dwc/img-merge-service
    container_name: img-merge-service
    environment:
      - STORAGE_DIR=/storage
      - PORT=8080
      - HOST=0.0.0.0
      - MAX_CONTENT_LENGTH=10737418240
      - DEBUG=false
      # Cloudflare Tunnel (可选)
      # - CLOUDFLARE_TUNNEL_TOKEN=your-tunnel-token
    volumes:
      - ./data/img-merge:/storage
    ports:
      - "8080:8080"              # HTTP API
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  cs50-storage:
  dev-data:
  desktop-data:
